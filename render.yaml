services:
  - type: web
    name: emosync-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health.html
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://emosync-api.onrender.com
      - key: FRONTEND_URL
        value: http://localhost:5173
      - key: SANCTUM_STATEFUL_DOMAINS
        value: localhost:5173,localhost:3000
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_PORT
        value: "6543"
      - key: DB_DATABASE
        value: postgres

      # 🔑 Set variabel di bawah ini via Render Dashboard → Environment:
      # - APP_KEY        (isi dari .env kamu)
      # - DB_HOST        (isi DB_HOST dari .env)
      # - DB_USERNAME    (isi DB_USERNAME dari .env)
      # - DB_PASSWORD    (isi DB_PASSWORD dari .env)
