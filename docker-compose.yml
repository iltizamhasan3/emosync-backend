name: emosync-backend

services:
  mysql:
    image: mysql:8.0
    container_name: emosync_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: emosync
      MYSQL_USER: emosync
      MYSQL_PASSWORD: emosync123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - emosync_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: emosync_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 100M
    ports:
      - "8081:80"
    depends_on:
      - mysql
    networks:
      - emosync_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: emosync_app
    restart: unless-stopped
    ports:
      - "8000:8080"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: emosync
      DB_USERNAME: emosync
      DB_PASSWORD: emosync123
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
    networks:
      - emosync_network

networks:
  emosync_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local

